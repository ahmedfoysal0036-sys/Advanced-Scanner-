<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professor Scan-OS Pro | CamScanner Replica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript" onload="onOpenCvReady()"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700&display=swap');
        :root { --neon: #00f2ff; --dark: #000000; --card: #111111; }
        body { background: var(--dark); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; margin: 0; }
        
        /* Neon Styling */
        .neon-border { border: 2px solid var(--neon); box-shadow: 0 0 15px rgba(0,242,255,0.4); }
        .neon-text { font-family: 'Syncopate', sans-serif; color: var(--neon); text-shadow: 0 0 10px rgba(0,242,255,0.7); }
        
        /* Loader */
        #opencv-loader {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; transition: opacity 0.5s;
        }

        /* Canvas Container */
        .canvas-container {
            position: relative; background: #111; border-radius: 12px;
            padding: 10px; border: 1px solid #222; min-h-[300px];
            display: flex; align-items: center; justify-content: center;
        }
        canvas { max-width: 100%; height: auto; border-radius: 4px; }
        
        /* UI Elements */
        .btn-primary { background: var(--neon); color: black; font-weight: 800; transition: 0.3s; }
        .btn-primary:hover { opacity: 0.8; transform: scale(1.02); }
        .btn-secondary { background: #222; color: white; border: 1px solid #333; }
        .btn-secondary:hover { bg: #333; }
    </style>
</head>
<body>

    <div id="opencv-loader">
        <div class="text-center">
            <i class="fas fa-brain fa-spin text-5xl text-cyan-400 mb-4"></i>
            <h1 class="neon-text text-2xl mb-2">SCAN-OS PRO</h1>
            <p class="text-xs text-gray-500 uppercase tracking-widest">Loading AI Vision Engine...</p>
            <p class="text-[10px] text-gray-700 mt-2">(Powered by OpenCV.js)</p>
        </div>
    </div>

    <div id="main-app" class="opacity-0 transition-opacity duration-1000">
        <nav class="p-5 border-b border-white/10 flex justify-between items-center bg-black/50 backdrop-blur-xl sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-cyan-500 flex items-center justify-center text-black font-black">P</div>
                <h1 class="neon-text text-sm tracking-widest">SCAN-OS <span class="text-white opacity-50">PRO</span></h1>
            </div>
            <p class="text-[10px] text-gray-600 uppercase hidden md:block">CamScanner Replica v2.5</p>
        </nav>

        <main class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-zinc-900 p-6 rounded-2xl border border-white/5 shadow-xl">
                    <input type="file" id="fileInput" class="hidden" accept="image/*" capture="environment">
                    <button onclick="document.getElementById('fileInput').click()" class="w-full btn-primary py-4 rounded-xl flex items-center justify-center gap-3 mb-4">
                        <i class="fas fa-camera text-xl"></i>
                        <span>TAKE PICTURE / UPLOAD</span>
                    </button>
                    <p class="text-[10px] text-gray-500 text-center uppercase tracking-widest">Step 1: Capture Document</p>
                </div>

                <div id="processing-panel" class="bg-zinc-900 p-6 rounded-2xl border border-white/5 space-y-4 hidden">
                    <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest">Step 2: Process Engine</h3>
                    
                    <button onclick="detectAndWarp()" class="w-full btn-secondary py-3 rounded-lg text-xs font-bold uppercase flex items-center justify-center gap-2">
                        <i class="fas fa-magic text-cyan-400"></i> Auto Crop & Flatten
                    </button>

                    <div class="flex gap-2 pt-2">
                        <button onclick="applyMagicColor()" class="flex-1 py-3 bg-zinc-800 rounded-lg text-[10px] font-bold hover:border hover:border-cyan-500 transition uppercase">Magic Color</button>
                        <button onclick="applyBwFilter()" class="flex-1 py-3 bg-zinc-800 rounded-lg text-[10px] font-bold hover:border hover:border-cyan-500 transition uppercase">B&W Document</button>
                    </div>

                    <button onclick="savePDF()" class="w-full bg-white text-black font-black py-4 rounded-xl mt-4 flex items-center justify-center gap-3 shadow-lg hover:bg-cyan-400 transition">
                        <i class="fas fa-file-pdf text-xl"></i> SAVE AS PDF
                    </button>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-4">
                <div class="flex justify-between items-center text-[10px] font-black tracking-widest text-cyan-500 uppercase">
                    <span>Virtual Viewport</span>
                    <span id="status text-gray-500">Idle</span>
                </div>
                
                <div class="canvas-container neon-border" id="inputContainer">
                    <canvas id="inputCanvas"></canvas>
                    <div id="placeholder" class="absolute text-zinc-800 text-6xl opacity-30"><i class="fas fa-file-contract"></i></div>
                </div>

                <div class="canvas-container hidden" id="outputContainer">
                    <canvas id="outputCanvas"></canvas>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- OpenCV Initialization ---
        function onOpenCvReady() {
            document.getElementById('opencv-loader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('opencv-loader').style.display = 'none';
                document.getElementById('main-app').style.opacity = '1';
            }, 500);
            console.log('OpenCV.js is ready.');
        }

        const fileInput = document.getElementById('fileInput');
        const inputCanvas = document.getElementById('inputCanvas');
        const outputCanvas = document.getElementById('outputCanvas');
        let originalMat = null;
        let processedMat = null;

        // --- File Upload & Display ---
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    // Display original on input canvas
                    inputCanvas.width = img.width;
                    inputCanvas.height = img.height;
                    const ctx = inputCanvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    
                    // Create OpenCV Matrix
                    if(originalMat) originalMat.delete();
                    originalMat = cv.imread(inputCanvas);
                    
                    // UI Updates
                    document.getElementById('placeholder').style.display = 'none';
                    document.getElementById('processing-panel').classList.remove('hidden');
                    document.getElementById('inputContainer').classList.remove('hidden');
                    document.getElementById('outputContainer').classList.add('hidden');
                    setStatus('Image Loaded');
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // --- CORE LOGIC: Smart Edge Detection & Perspective Warp ---
        function detectAndWarp() {
            if(!originalMat) return;
            setStatus('Processing Edges...');

            let src = originalMat.clone();
            let dst = new cv.Mat();
            
            // 1. Grayscale & Blur
            cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
            cv.GaussianBlur(dst, dst, new cv.Size(5, 5), 0);
            
            // 2. Canny Edge Detection
            cv.Canny(dst, dst, 75, 200);
            
            // 3. Find Contours
            let contours = new cv.MatVector();
            let hierarchy = new cv.Mat();
            cv.findContours(dst, contours, hierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);
            
            // 4. Find the largest 4-point contour (the document)
            let maxArea = 0;
            let docContour = null;

            for (let i = 0; i < contours.size(); ++i) {
                let cnt = contours.get(i);
                let area = cv.contourArea(cnt);
                if (area > 1000) {
                    let peri = cv.arcLength(cnt, true);
                    let approx = new cv.Mat();
                    cv.approxPolyDP(cnt, approx, 0.02 * peri, true);
                    
                    if (approx.rows == 4 && area > maxArea) {
                        docContour = approx;
                        maxArea = area;
                    } else {
                        approx.delete();
                    }
                }
            }

            if (!docContour) {
                setStatus('No Document Edge Found. Try again.');
                src.delete(); dst.delete(); contours.delete(); hierarchy.delete();
                return;
            }

            // 5. Get points and Wrap Perspective
            // Order points: tl, tr, br, bl
            let pts = [];
            for(let i=0; i<4; i++) {
                pts.push({x: docContour.data32S[i*2], y: docContour.data32S[i*2+1]});
            }
            docContour.delete();

            // Sort points logic (simplified)
            pts.sort((a,b) => a.y - b.y);
            let tl = pts[0].x < pts[1].x ? pts[0] : pts[1];
            let tr = pts[0].x < pts[1].x ? pts[1] : pts[0];
            let bl = pts[2].x < pts[3].x ? pts[2] : pts[3];
            let br = pts[2].x < pts[3].x ? pts[3] : pts[2];

            // Calculate output dimensions
            const widthA = Math.sqrt(Math.pow(br.x - bl.x, 2) + Math.pow(br.y - bl.y, 2));
            const widthB = Math.sqrt(Math.pow(tr.x - tl.x, 2) + Math.pow(tr.y - tl.y, 2));
            const maxWidth = Math.max(widthA, widthB);

            const heightA = Math.sqrt(Math.pow(tr.x - br.x, 2) + Math.pow(tr.y - br.y, 2));
            const heightB = Math.sqrt(Math.pow(tl.x - bl.x, 2) + Math.pow(tl.y - bl.y, 2));
            const maxHeight = Math.max(heightA, heightB);

            // From coordinates to To coordinates
            let fromCoords = cv.matFromArray(4, 1, cv.CV_32FC2, [tl.x, tl.y, tr.x, tr.y, br.x, br.y, bl.x, bl.y]);
            let toCoords = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, maxWidth - 1, 0, maxWidth - 1, maxHeight - 1, 0, maxHeight - 1]);

            // Warp Perspective
            let M = cv.getPerspectiveTransform(fromCoords, toCoords);
            if(processedMat) processedMat.delete();
            processedMat = new cv.Mat();
            let dsize = new cv.Size(maxWidth, maxHeight);
            cv.warpPerspective(src, processedMat, M, dsize, cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());

            // Display on Output Canvas
            cv.imshow(outputCanvas, processedMat);
            
            // Switch Views
            document.getElementById('inputContainer').classList.add('hidden');
            document.getElementById('outputContainer').classList.remove('hidden');
            document.getElementById('outputContainer').classList.add('neon-border');

            // Cleanup
            src.delete(); dst.delete(); contours.delete(); hierarchy.delete();
            M.delete(); fromCoords.delete(); toCoords.delete();
            setStatus('Cropped & Flattened.');
        }

        // --- FILTERS: Magic Color & B&W ---
        function applyMagicColor() {
            if(!processedMat) return;
            setStatus('Enhancing...');
            let dst = processedMat.clone();
            
            // Brightness & Contrast Adjustment (Magic Color replica)
            cv.convertScaleAbs(dst, dst, 1.2, 10); // alpha=contrast, beta=brightness
            
            cv.imshow(outputCanvas, dst);
            dst.delete();
            setStatus('Magic Color Applied.');
        }

        function applyBwFilter() {
            if(!processedMat) return;
            setStatus('Converting to B&W...');
            let dst = new cv.Mat();
            
            // Grayscale + Adaptive Thresholding (for clean doc look)
            cv.cvtColor(processedMat, dst, cv.COLOR_RGBA2GRAY);
            cv.adaptiveThreshold(dst, dst, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY, 11, 2);
            
            cv.imshow(outputCanvas, dst);
            dst.delete();
            setStatus('B&W Document Applied.');
        }

        // --- SAVE PDF ---
        function savePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const imgData = outputCanvas.toDataURL('image/jpeg', 0.9);
            
            // Fit to A4
            const pw = doc.internal.pageSize.getWidth();
            const ph = doc.internal.pageSize.getHeight();
            doc.addImage(imgData, 'JPEG', 10, 10, pw-20, ph-20);
            doc.save(`PRO_SCAN_${Date.now()}.pdf`);
            setStatus('PDF Saved.');
        }

        function setStatus(msg) {
            document.getElementById('status text-gray-500').innerText = msg;
        }
    </script>
</body>
</html>
